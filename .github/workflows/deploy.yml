name: Deploy to Server

on:
  push:
    branches: [master]

concurrency:
  group: "deploy"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile
      - run: pnpm build

      - name: Install SSH key
        uses: gacts/install-ssh-key@v1
        with:
          privatekey: ${{ secrets.SERVER_SSH_KEY }}

      - name: Deploy to server
        run: |
          ssh-keyscan -H 8.148.176.202 >> ~/.ssh/known_hosts 2>/dev/null
          tar czf /tmp/dist.tar.gz -C dist .
          scp /tmp/dist.tar.gz carrot@8.148.176.202:/tmp/
          ssh carrot@8.148.176.202 "
            mkdir -p /home/carrot/zero-to-tech/dist &&
            rm -rf /home/carrot/zero-to-tech/dist/* &&
            tar xzf /tmp/dist.tar.gz -C /home/carrot/zero-to-tech/dist &&
            rm /tmp/dist.tar.gz
          "
