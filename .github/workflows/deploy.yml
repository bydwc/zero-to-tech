name: Deploy to Server

on:
  push:
    branches: [master]

concurrency:
  group: "deploy"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile
      - run: pnpm build

      - name: Deploy to server
        env:
          SSHPASS: ${{ secrets.SERVER_PASSWORD }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass
          ssh-keyscan -H 8.148.176.202 >> ~/.ssh/known_hosts 2>/dev/null
          export SSHPASS=${{ secrets.SERVER_PASSWORD }}
          sshpass -e ssh carrot@8.148.176.202 "mkdir -p /home/carrot/zero-to-tech/dist"
          tar czf /tmp/dist.tar.gz -C dist .
          sshpass -e scp -o StrictHostKeyChecking=no /tmp/dist.tar.gz carrot@8.148.176.202:/tmp/
          sshpass -e ssh carrot@8.148.176.202 "
            rm -rf /home/carrot/zero-to-tech/dist/* &&
            tar xzf /tmp/dist.tar.gz -C /home/carrot/zero-to-tech/dist &&
            rm /tmp/dist.tar.gz
          "
