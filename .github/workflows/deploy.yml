name: Deploy to Server

on:
  push:
    branches: [master]

concurrency:
  group: "deploy"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile
      - run: pnpm build

      - name: Deploy to server
        shell: bash
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          # 写入密钥并清理 Windows 换行符
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # 启动 ssh-agent 并加载密钥
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/deploy_key

          # 添加服务器到 known_hosts
          ssh-keyscan -H 8.148.176.202 >> ~/.ssh/known_hosts 2>/dev/null

          # 打包 dist/
          tar czf /tmp/dist.tar.gz -C dist .

          # 上传到服务器
          scp /tmp/dist.tar.gz carrot@8.148.176.202:/tmp/

          # 服务器上解压
          ssh carrot@8.148.176.202 "
            mkdir -p /home/carrot/zero-to-tech/dist &&
            rm -rf /home/carrot/zero-to-tech/dist/* &&
            tar xzf /tmp/dist.tar.gz -C /home/carrot/zero-to-tech/dist &&
            rm /tmp/dist.tar.gz
          "
