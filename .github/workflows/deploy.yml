name: Deploy to Server

on:
  push:
    branches: [master]

concurrency:
  group: "deploy"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile
      - run: pnpm build

      - name: Deploy to server
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          # 写入 SSH 密钥
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SSH_OPTS="-o StrictHostKeyChecking=no -i ~/.ssh/deploy_key"

          # 打包 dist/
          tar czf /tmp/dist.tar.gz -C dist .

          # 上传到服务器
          scp $SSH_OPTS /tmp/dist.tar.gz carrot@8.148.176.202:/tmp/

          # 服务器上解压到目标目录
          ssh $SSH_OPTS carrot@8.148.176.202 "
            mkdir -p /home/carrot/zero-to-tech/dist &&
            rm -rf /home/carrot/zero-to-tech/dist/* &&
            tar xzf /tmp/dist.tar.gz -C /home/carrot/zero-to-tech/dist &&
            rm /tmp/dist.tar.gz
          "
